.content{

    line-height:1.6;

</style>

</head>

    <div class="content">
        안녕하세요.<br>
        이곳은 제 개인 홈페이지입니다.
    </div>
</div>

<div class="box">
    <div class="title">프로젝트</div>

        체스 퀴즈 사이트<br>
        ESP32 알람 프로젝트<br>

    </div>
</div>

</body>
</html>
